d_model: 2176
n_heads: 4
n_loops: 16
vocab_size: 16384
sct_rank: 32
max_seq_len: 512
lr_muon: 0.0005
lr_adamw: 0.0001
wd_muon: 0.2
wd_adamw: 0.05
lotus_rank: 32
clip_norm: 1.0
sct_l1: 1e-6
batch_size: 8
max_steps: 100000
log_every: 10
data_path: /mnt/e43497ab-0ff2-45b4-b45f-28de3339a53e/aria_data/pretrain/mix

# --- Checkpointing (crash-safe; auto-resumes from this file) ---
# train_phased saves every `save_every` steps; re-running resumes.
# Pass --fresh to start over.
checkpoint_path: /mnt/e43497ab-0ff2-45b4-b45f-28de3339a53e/aria_data/checkpoints/train_50m.pt
save_every: 1000

# --- Supervised factual memory (Engram) ---
# 2^18 = 262144 entries (4x smaller than 2^20, frees VRAM).
engram_vocab_size: 262144

# --- Aria-JEPA ---
jepa: true
jepa_pred_hidden: 1024
jepa_context_keep: 0.7
jepa_patch_size: 8
jepa_lambda_k: 1.0
jepa_lambda_l: 1.0
jepa_stp: 0.1
jepa_vicreg_var: 1.0
jepa_vicreg_cov: 1.0
jepa_dropout: 0.5
jepa_kl_coef: 0.01

# --- Declarative multi-stage training ---
# Per-stage batch_size tuned to fill the 16.7GB card.
training_stages:
  - name: "engram_factual_warmup"
    steps: 9000
    engram_only: true
    image_prob: 0.0
    batch_size: 6
  - name: "masked_jepa_world_modeling"
    steps: 13000
    jepa_only: true
    image_prob: 0.0
    batch_size: 6
  - name: "joint_reasoning_pretrain"
    steps: 18000
    engram_only: false
    image_prob: 0.3
    batch_size: 6

# --- Technical optimizations (Blackwell) ---
sct_kernel: true
sct_fp8: true
adaptive_loops: true
use_checkpointing: true
bitnet_v2: true
bitnet_act_bits: 4
bitnet_hadamard: true
nsa: true
nsa_every: 3
mtp: true
mtp_k: 4
mtp_loss_coef: 0.1
fa4: false
