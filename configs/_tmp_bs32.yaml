d_model: 1152
n_heads: 18
n_loops: 8
vocab_size: 16384
sct_rank: 16
max_seq_len: 512
lr_muon: 0.0003
lr_adamw: 0.00006
wd_muon: 0.2
wd_adamw: 0.05
lotus_rank: 16
clip_norm: 1.0
sct_l1: 1e-6
batch_size: 32
max_steps: 650000
log_every: 10
data_path: /mnt/e43497ab-0ff2-45b4-b45f-28de3339a53e/aria_data/pretrain/corpus.bin

# --- Checkpointing (crash-safe; auto-resumes from this file) ---
checkpoint_path: /mnt/e43497ab-0ff2-45b4-b45f-28de3339a53e/aria_data/checkpoints/train_29m.pt
save_every: 2000

# --- Supervised factual memory (Engram) ---
engram_vocab_size: 65536  # 2^16 entries in the factual embedding table

# --- Aria-JEPA (I-JEPA masked latent prediction + Semantic Tube Prediction) ---
jepa: true
jepa_pred_hidden: 512
jepa_context_keep: 0.7
jepa_patch_size: 8
jepa_lambda_k: 1.0
jepa_lambda_l: 1.0
jepa_stp: 0.1
jepa_vicreg_var: 1.0
jepa_vicreg_cov: 1.0
jepa_dropout: 0.5
jepa_kl_coef: 0.01

# --- Declarative multi-stage training (tuned for ~48h on 5060 Ti 16.7GB) ---
training_stages:
  - name: "engram_factual_warmup"
    steps: 5000
    engram_only: true
    image_prob: 0.0
    batch_size: 32
  - name: "masked_jepa_world_modeling"
    steps: 10000
    jepa_only: true
    image_prob: 0.0
    batch_size: 32
  - name: "joint_reasoning_pretrain"
    steps: 600000
    engram_only: false
    image_prob: 0.1
    batch_size: 32

# --- Technical optimizations (Blackwell) ---
sct_kernel: true
sct_fp8: true
adaptive_loops: true
use_checkpointing: true
bitnet_v2: true
bitnet_act_bits: 4
bitnet_hadamard: true
nsa: true                       # native sparse attention over recurrent hidden (SDPA/flash backend)
nsa_every: 3                    # 3 GDN2 layers per 1 NSA (interleaved inside HelixCore)
mtp: true                       # Multi-Token Prediction (DeepSeek-V3): 4 heads, 0.5^i decay
mtp_k: 4
mtp_loss_coef: 0.1
fa4: false                     # NSA backend: SDPA flash on Blackwell; flip true only if flash-attn wheel present
