d_model: 2048
n_heads: 32
n_loops: 6
vocab_size: 16384
sct_rank: 32
max_seq_len: 512
lr_muon: 0.0005
lr_adamw: 0.0001
wd_muon: 0.2
wd_adamw: 0.05
lotus_rank: 32
clip_norm: 1.0
sct_l1: 1e-6
batch_size: 2
max_steps: 500
log_every: 10

# --- Supervised factual memory (Engram) ---
engram_vocab_size: 1048576  # 2^20 entries in the factual embedding table

# --- Declarative multi-stage training ---
training_stages:
  - name: "engram_factual_warmup"
    steps: 300
    engram_only: true
    image_prob: 0.0
  - name: "joint_reasoning_pretrain"
    steps: 200
    engram_only: false
    image_prob: 0.5

# --- Technical optimizations (Blackwell) ---
sct_kernel: true
sct_fp8: true
adaptive_loops: true
use_checkpointing: false
bitnet_v2: true
bitnet_act_bits: 4
bitnet_hadamard: true
